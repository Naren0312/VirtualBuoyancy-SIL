# ══════════════════════════════════════════════════════════════════════════════
# ROV Configuration — All parameters consolidated
# ══════════════════════════════════════════════════════════════════════════════

# ── Control Node ─────────────────────────────────────────────────────────────
control_node:
  ros__parameters:
    # PID gains: [roll, pitch, yaw, surge, sway, heave]
    # Values from original pid.conf:
    #   surge: kp=0.2, ki=0, kd=0
    #   sway:  kp=0.2, ki=0, kd=0
    #   heave: kp=3.0, ki=0.165, kd=4.0
    #   roll:  kp=0.0, ki=0, kd=0
    #   pitch: kp=1.0, ki=0.024, kd=1.0
    #   yaw:   kp=3.0, ki=0.031, kd=1.0
    pid:
      kp: [0.0, 1.0, 3.0, 0.2, 0.2, 1.0]
      ki: [0.0, 0.024, 0.031, 0.0, 0.0, 0.05]
      kd: [0.0, 1.0, 1.0, 0.0, 0.0, 8.0]

    # Thruster reverse flags [t1, t2, t3, t4, t5, t6]
    thruster_reverse: [false, false, false, true, true, false]

    # Control parameters
    force_deadband: 0.01       # tMin threshold
    surface_depth: 0.22        # initial heave setpoint on TELEOP entry
    integral_clamp: 2.55       # integral windup limit (±)
    pwm_min: 1250
    pwm_max: 1750
    pwm_neutral: 1500

    # Sensor tare (bias removal)
    pitch_tare: 0.0
    roll_tare: 0.0

    # Alpha lookup table for sway coupling
    # Indices: [+2, -2, +3, -3, +5, -5, +10, -10]
    alpha_table: [0.1, 0.1, 1.1, 0.1, 10.5, 0.3, 1.3, 10.5]
    alpha_default: 0.0

    # Surge special case (hardcoded PID when setpoint == 0)
    surge_zero_kp: 0.642
    surge_zero_kd: 0.756
    surge_zero_ki: 0.007

    # Heave low-pass filter
    heave_lpf_threshold: 0.5
    heave_lpf_alpha: 0.975

# ── Thruster Driver Node ─────────────────────────────────────────────────────
thruster_driver_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    # Pololu Maestro channel mapping for 6 thrusters
    port_mapping: [0, 10, 4, 2, 8, 6]

# ── Serial Bridge Node ───────────────────────────────────────────────────────
serial_bridge_node:
  ros__parameters:
    serial_port: "/dev/nuc_nano"
    baud_rate: 9600
#---Teleop Node---
teleop_node:
  ros__parameters:
    # STICKS (only turning uses sticks)
    axis_yaw_coarse: 0        # Left stick left/right → turn (big steps)
    axis_yaw_fine: 3          # Right stick left/right → turn (small steps)

    # FACE BUTTONS (think of the diamond shape)
    btn_surge_fwd: 3          # Y (top)    → go forward
    btn_surge_bwd: 0          # A (bottom) → go backward
    btn_sway_left: 2          # X (left)   → slide left
    btn_sway_right: 1         # B (right)  → slide right

    # SHOULDER BUTTONS
    btn_heave_up: 4           # LB → go up (rise)
    btn_heave_down: 5         # RB → go down (dive)

    # SMALL CENTER BUTTONS
    btn_pitch_up: 7           # Start → tilt nose up
    btn_pitch_down: 6         # Back  → tilt nose down

    # STICK CLICKS (press the stick down like a button)
    btn_stop_motion: 9        # Right stick click → stop all movement
    btn_emergency_stop: 8     # Left stick click  → emergency stop

    # LIMITS (unchanged)
    surge_limit: 5.0
    sway_limit: 5.0
    heave_min: 0.0
    heave_max: 10.0
    yaw_limit: 180.0
    yaw_coarse_step: 10.0
    yaw_fine_step: 1.0
    heave_step: 0.1
    pitch_step: 10.0
    initial_heave: 0.22
